<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
body {
  margin:0;
  background:transparent;
  font-family: Arial, sans-serif;
}
#ticker-container {
  position: relative;
  width:100%;
  overflow:hidden;
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
}
#ticker-logo {
  height: 80px;
  width: auto;
  margin-right: 20px;
  object-fit: contain;
  transition: opacity 1.5s ease-in-out;
}
#ticker-text {
  white-space: nowrap;
  font-size: 28px;
  font-weight: 600;
  transition: opacity 1.5s ease-in-out;
}
</style>
</head>
<body>
<div id="ticker-container">
  <img id="ticker-logo" src="" alt="" />
  <span id="ticker-text">Loading deals…</span>
</div>
<script>
async function fetchDeals() {
  const res = await fetch('./manual.json', { cache: 'no-store' });
  return await res.json();
}
function startTicker(data) {
  const items = data.ticker;
  let index = 0;
  const logoEl = document.getElementById('ticker-logo');
  const textEl = document.getElementById('ticker-text');
  function update() {
    const item = items[index];
    logoEl.src = item.logo;
    logoEl.alt = item.firm;
    textEl.style.opacity = 0;
    setTimeout(() => {
      textEl.textContent = item.firm + ' – ' + item.text;
      textEl.style.opacity = 1;
    }, 250);
    index = (index + 1) % items.length;
  }
  update();
  setInterval(update, 10000);
}
fetchDeals().then(startTicker).catch(err => {
  document.getElementById('ticker-text').textContent = 'Failed to load deals';
});
</script>
</body>
</html>
