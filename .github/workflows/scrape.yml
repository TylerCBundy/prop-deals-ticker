name: Update deals.json

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scrape.js

      - name: Commit changes
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add deals.json
          git commit -m "Update deals" || exit 0
          git push
