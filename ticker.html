<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { margin:0; background:transparent; overflow:hidden; font-family: Arial, sans-serif; }
    .wrap { white-space: nowrap; position: relative; }
    .ticker {
      display:inline-block;
      padding-left: 100%;
      animation: scroll 30s linear infinite;
      font-size: 36px;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,.8);
    }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div class="wrap"><div id="ticker" class="ticker">Loading deals…</div></div>

  <script>
    async function loadDeals() {
      const res = await fetch('./deals.json', { cache: 'no-store' });
      const deals = await res.json();

      const parts = deals
        .filter(d => d.active)
        .map(d => `${d.firm}: ${d.deal}${d.code ? ` (Code: ${d.code})` : ''}${d.expires ? ` • Ends ${d.expires}` : ''}`);

      document.getElementById('ticker').textContent = parts.length ? parts.join('   |   ') : 'No active promos found.';
    }

    loadDeals();
    setInterval(loadDeals, 60_000);
  </script>
</body>
</html>
