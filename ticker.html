<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
body {
  margin:0;
  background:transparent;
  font-family: Arial, sans-serif;
}
#ticker-container {
  position: relative;
  width:100%;
  overflow:hidden;
  background: transparent;
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
}
#ticker-logo {
  height: 80px;
  width: auto;
  margin-right: 20px;
  object-fit: contain;
  transition: opacity 0.5s ease-in-out;
}
#ticker-text {
  white-space: nowrap;
  font-size: 28px;
  font-weight: 600;
  transition: opacity 0.5s ease-in-out;
}
.firm-name {
  font-size: 34px;
  font-weight: 700;
  margin-right: 6px;
}
.deal-percent {
  font-size: 36px;
  font-weight: 800;
  color: #3cff00;
}  
</style>
</head>
<body>
<div id="ticker-container">
  <img id="ticker-logo" src="" alt="" />
  <span id="ticker-text">Loading deals…</span>
</div>
<script>
async function fetchDeals() {
  const res = await fetch('./manual.json', { cache: 'no-store' });
  return await res.json();
}
function formatDeal(text) {
  return text.replace(/(\d+%)/, '<span class="deal-percent">$1</span>');
}
function startTicker(data) {
  const items = data.ticker;
  let index = 0;

  const logoEl = document.getElementById('ticker-logo');
  const textEl = document.getElementById('ticker-text');

  const FADE_MS = 500;     // fade out 0.5s
  const HOLD_MS = 59000;    // visible time so total cycle stays ~10s

  function setContent(item) {
    logoEl.src = item.logo;
    logoEl.alt = item.firm;
    textEl.innerHTML = '<span class="firm-name">' + item.firm + '</span> ' + formatDeal(item.text);
  }

  // Initialize with first item visible
  setContent(items[index]);
  logoEl.style.opacity = 1;
  textEl.style.opacity = 1;

  function update() {
    // fade OUT current
    logoEl.style.opacity = 0;
    textEl.style.opacity = 0;

    // after fade out completes, swap content and fade IN
    setTimeout(() => {
      index = (index + 1) % items.length;
      setContent(items[index]);

      logoEl.style.opacity = 1;
      textEl.style.opacity = 1;
    }, FADE_MS);
  }

  // Run update every 10s: 0.5s fade out + 9s hold + 0.5s fade in feels smooth
  setInterval(update, FADE_MS + HOLD_MS);
}

fetchDeals().then(startTicker).catch(err => {
  document.getElementById('ticker-text').textContent = 'Failed to load deals';
});
</script>
</body>
</html>
